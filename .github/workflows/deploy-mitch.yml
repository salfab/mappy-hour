name: Deploy to Mitch

on:
  # IMPORTANT: wait for the image build to complete before deploying. If we
  # listen to `push: branches: [master]` directly, this workflow can finish
  # BEFORE `docker-publish.yml` has pushed the new image to GHCR — Mitch then
  # pulls the previous `:latest` tag and the deploy is effectively a no-op.
  # `workflow_run` only fires after `Build & publish Docker image` completes;
  # the `conclusion == 'success'` check below skips failed builds.
  workflow_run:
    workflows: ["Build & publish Docker image"]
    types: [completed]
    branches: [master]
  workflow_dispatch: {}

concurrency:
  group: deploy-mitch
  cancel-in-progress: false   # Ne pas annuler un déploiement en cours

jobs:
  deploy:
    # Skip deploy when triggered by a failed `Build & publish Docker image`
    # run — we don't want to ship a half-built image. workflow_dispatch has
    # no `workflow_run` context so the conclusion is empty, hence the
    # explicit `!= 'failure'` (not `== 'success'`).
    if: ${{ github.event.workflow_run == null || github.event.workflow_run.conclusion == 'success' }}

    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production   # Optionnel : ajouter un reviewer requis dans Settings → Environments

    steps:
      - name: Setup Tailscale
        uses: tailscale/github-action@v3
        with:
          # OAuth client (approche recommandée — pas de rotation manuelle de clé).
          # Créer dans Tailscale admin → Settings → OAuth clients → Generate client
          # avec scopes "Devices Core (Write)" ET "Auth Keys (Write)" — les deux sont
          # requis, sans auth_keys on a 403 "calling actor does not have enough permissions".
          # Ajouter ensuite les secrets GitHub :
          #   TS_OAUTH_CLIENT_ID     → client ID
          #   TS_OAUTH_CLIENT_SECRET → client secret
          # L'ACL Tailscale doit contenir "tag:ci" dans tagOwners (voir docs/deploy.md).
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_CLIENT_SECRET }}
          tags: tag:ci

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.MITCH_SSH_KEY }}

      - name: Pin Mitch host key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.MITCH_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Wait for Tailscale propagation
        run: |
          # The ephemeral tag:ci node needs a few seconds for its netmap to
          # reach peers (notably mitch) — without this, SSH fails with
          # "Network is unreachable".
          sleep 10
          tailscale status | head -5

      - name: Sync runtime secrets to Mitch .env
        env:
          HOST: ${{ secrets.MITCH_SSH_HOST }}
          USER: ${{ secrets.MITCH_SSH_USER }}
          UMAMI_APP_SECRET: ${{ secrets.UMAMI_APP_SECRET }}
          UMAMI_DB_PASSWORD: ${{ secrets.UMAMI_DB_PASSWORD }}
        run: |
          set -e
          # Build the .env content locally from GH secrets, then scp it to Mitch.
          # Authoritative .env: all variables that docker-compose.yml expects at
          # runtime are owned by CI. The host file is overwritten on every
          # deploy — no manual editing on Mitch is needed nor recommended.
          # Existing variables not in this list (MAPPY_ATLAS_PATH, etc.) are
          # stable per-host and live in a separate `.env.host` file that
          # docker-compose loads alongside (cf. mitch-deploy-docker.ps1).
          cat > .env.ci << EOF
          UMAMI_APP_SECRET=$UMAMI_APP_SECRET
          UMAMI_DB_PASSWORD=$UMAMI_DB_PASSWORD
          EOF
          scp -o ConnectTimeout=30 .env.ci "$USER@$HOST:C:/srv/mappy-hour/.env.ci"

      - name: Deploy
        env:
          HOST: ${{ secrets.MITCH_SSH_HOST }}
          USER: ${{ secrets.MITCH_SSH_USER }}
        run: |
          set -e
          # Bootstrap: pull latest repo state first (the deploy script lives in the
          # repo, so we can't trust the local copy to be current). Then run the
          # freshly-pulled script which does the actual docker compose pull/up.
          #
          # NOTE: `$LASTEXITCODE` is escaped via single quotes around the PS
          # body so bash leaves it alone — previously the `\$` escape inside a
          # double-quoted bash heredoc still got eaten, leaving PowerShell to
          # parse `if ( -ne 0)` (cosmetic CommandNotFoundException). Switching
          # to a single-quoted bash argument keeps the PS variable intact.
          ssh -o ConnectTimeout=30 -o ServerAliveInterval=10 "$USER@$HOST" \
            'powershell -NoProfile -Command "Set-Location C:\srv\mappy-hour; git pull --ff-only; if ($LASTEXITCODE -ne 0) { exit 1 }; & powershell -NoProfile -ExecutionPolicy Bypass -File C:\srv\mappy-hour\scripts\headless-server-selfhosting\mitch-deploy-docker.ps1"'

      - name: Health check
        env:
          HOST: ${{ secrets.MITCH_SSH_HOST }}
          USER: ${{ secrets.MITCH_SSH_USER }}
        run: |
          sleep 15
          STATUS=$(ssh "$USER@$HOST" \
            "powershell -NoProfile -Command \"(Invoke-WebRequest 'http://127.0.0.1:3000/api/datasets' -UseBasicParsing -TimeoutSec 10).StatusCode\"" \
            2>&1 | tr -d '[:space:]')
          echo "Health check status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Health check failed (got '$STATUS')"
            exit 1
          fi
          echo "Deployment successful"
