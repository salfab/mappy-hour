name: Publish places

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Semver bump (major|minor|patch)"
        required: false
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major
  schedule:
    # Weekly Monday 03:00 UTC — picks up new OSM contributions over the
    # weekend without competing with refresh-mitch-atlas (which runs
    # on-demand from the operator).
    - cron: "0 3 * * 1"

concurrency:
  group: publish-places
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.6
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Publish places release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pnpm places:publish -- \
            --bump=${{ github.event.inputs.bump || 'patch' }} \
            --publish-now
