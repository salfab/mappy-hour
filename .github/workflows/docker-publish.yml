name: Build & publish Docker image

on:
  push:
    branches:
      - master
    tags:
      - "v*"
  # Chain after Publish places so a new places release immediately
  # triggers an image rebuild that bakes it in (Posture 4 image-as-
  # source-of-truth path; the runtime check is the faster path that
  # doesn't need this rebuild).
  workflow_run:
    workflows: ["Publish places"]
    types:
      - completed
  workflow_dispatch:

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download latest places release (bake into image)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p data/processed/places
          LATEST=$(gh release list --limit 100 --json tagName --jq '.[].tagName' | grep '^places-v' | sort -V | tail -1)
          if [ -z "$LATEST" ]; then
            # Fail-loud, not fail-soft. A missing places-v* release is a real
            # operational problem (publish-places.yml never ran, or its first
            # run failed silently). Baking an empty placeholder would silently
            # ship a prod image with zero terraces — the operator must see this
            # surface.
            echo "[publish] ✗ no places-v* release found. Dispatch the 'Publish places'" >&2
            echo "[publish]   workflow first (or check why publish-places.yml hasn't" >&2
            echo "[publish]   completed successfully). The image refuses to build" >&2
            echo "[publish]   without a real places dataset." >&2
            exit 1
          fi
          echo "[publish] baking places release: $LATEST"
          gh release download "$LATEST" -p 'places.json' -D data/processed/places
          node scripts/runtime/split-places-per-region.mjs data/processed/places/places.json data/processed/places/

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # latest sur master
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}
            # sha court sur master
            type=sha,prefix=sha-,enable=${{ github.ref == 'refs/heads/master' }}
            # tag semver sur v*
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # NEXT_PUBLIC_* env vars must be present at `next build` time so
          # they get baked into the client bundle. Passed as build args
          # for the Dockerfile to forward into the build environment.
          build-args: |
            NEXT_PUBLIC_STADIA_API_KEY=${{ secrets.NEXT_PUBLIC_STADIA_API_KEY }}
            NEXT_PUBLIC_UMAMI_WEBSITE_ID=${{ secrets.NEXT_PUBLIC_UMAMI_WEBSITE_ID }}
