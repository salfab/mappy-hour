name: Build & publish Docker image

on:
  push:
    branches:
      - master
    tags:
      - "v*"
  # Chain after Publish places so a new places release immediately
  # triggers an image rebuild that bakes it in (Posture 4 image-as-
  # source-of-truth path; the runtime check is the faster path that
  # doesn't need this rebuild).
  workflow_run:
    workflows: ["Publish places"]
    types:
      - completed
  workflow_dispatch:

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download latest places release (bake into image)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p data/processed/places
          LATEST=$(gh release list --limit 100 --json tagName --jq '.[].tagName' | grep '^places-v' | sort -V | tail -1)
          if [ -n "$LATEST" ]; then
            echo "[publish] baking places release: $LATEST"
            gh release download "$LATEST" -p 'places.json' -D data/processed/places
            node scripts/runtime/split-places-per-region.mjs data/processed/places/places.json data/processed/places/
          else
            # No places release yet → write an empty placeholder so the
            # Dockerfile `COPY data/processed/places/*.json` step has something
            # to read. The runtime startup check will fetch the real dataset
            # once the operator publishes the first `places-v*` release.
            echo "[publish] no places-v* release found yet — baking an empty placeholder"
            printf '%s' '{"version":"0.0.0","generatedAt":"1970-01-01T00:00:00Z","source":"placeholder","bbox":[0,0,0,0],"totalPlaces":0,"categories":{"parks":0,"terraceCandidates":0,"outdoorSeatingYes":0},"places":[]}' > data/processed/places/places.json
          fi

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # latest sur master
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}
            # sha court sur master
            type=sha,prefix=sha-,enable=${{ github.ref == 'refs/heads/master' }}
            # tag semver sur v*
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
