        align-items: center;
        gap: 8px;
        font-size: 13px;
        padding: 2px 0;

      .legend-swatch {
        width: 12px;
        height: 12px;
        border-radius: 3px;
        flex-shrink: 0;

egion":"neuchatel","tileId":"e2556750_n1201750_s250","group":"neuchatel-city"},{"region":"neuchatel","tileId":"e2556500_n1201750_s250","group":"neuchatel-city"},{"region":"neuchatel","tileId":"e2556250_n1201750_s250","group":"neuchatel-city"},{"region":"neuchatel","tileId":"e2556250_n1202750_s250","group":"neuchatel-city"},{"region":"neuchatel","tileId":"e2556250_n1202500_s250","group":"neuchatel-city"},{"region":"neuchatel","tileId":"e2556250_n1202250_s250","group":"neuchatel-city"},{"region":"neuchatel","tileId":"e2556250_n1202000_s250","group":"neuchatel-city"},{"region":"neuchatel","tileId":"e2556500_n1202000_s250","group":"neuchatel-city"},{"region":"neuchatel","tileId":"e2556750_n1202000_s250","group":"neuchatel-city"},{"region":"neuchatel","tileId":"e2556500_n1202750_s250","group":"neuchatel-city"},{"region":"neuchatel","tileId":"e2558250_n1203250_s250","group":"neuchatel-city"},{"region":"neuchatel","tileId":"e2558000_n1203250_s250","group":"neuchatel-city"},{"region":"neuchatel","tileId":"e2557750_n1203250_s250","group":"neuchatel-city"},{"region":"neuchatel","tileId":"e2557500_n1203250_s250","group":"neuchatel-city"},{"region":"neuchatel","tileId":"e2557250_n1203250_s250","group":"neuchatel-city"},{"region":"neuchatel","tileId":"e2556500_n1203000_s250","group":"neuchatel-city"},{"region":"neuchatel","tileId":"e2556750_n1203000_s250","group":"neuchatel-city"},{"region":"neuchatel","tileId":"e2557000_n1203000_s250","group":"neuchatel-city"},{"region":"neuchatel","tileId":"e2557250_n1203000_s250","group":"neuchatel-city"},{"region":"neuchatel","tileId":"e2557500_n1202750_s250","group":"neuchatel-city"},{"region":"neuchatel","tileId":"e2556500_n1202250_s250","group":"neuchatel-city"},{"region":"neuchatel","tileId":"e2556750_n1202250_s250","group":"neuchatel-city"},{"region":"neuchatel","tileId":"e2556750_n1202750_s250","group":"neuchatel-city"},{"region":"neuchatel","tileId":"e2557000_n1202750_s250","group":"neuchatel-city"},{"region":"neuchatel","tileId":"e2556500_n1202500_s250","group":"neuchatel-city"},{"region":"neuchatel","tileId":"e2556750_n1202500_s250","group":"neuchatel-city"},{"region":"neuchatel","tileId":"e2557000_n1202250_s250","group":"neuchatel-city"},{"region":"neuchatel","tileId":"e2557500_n1203000_s250","group":"neuchatel-city"},{"region":"neuchatel","tileId":"e2557250_n1202750_s250","group":"neuchatel-city"},{"region":"neuchatel","tileId":"e2557000_n1202500_s250","group":"neuchatel-city"},{"region":"neuchatel","tileId":"e2557250_n1202500_s250","group":"neuchatel-city"},{"region":"neuchatel","tileId":"e2557750_n1203000_s250","group":"neuchatel-city"},{"region":"neuchatel","tileId":"e2558000_n1203000_s250","group":"neuchatel-city"},{"region":"neuchatel","tileId":"e2559000_n1203250_s250","group":"neuchatel-city"},{"region":"neuchatel","tileId":"e2560250_n1204000_s250","group":"neuchatel-city"},{"region":"neuchatel","tileId":"e2561500_n1204250_s250","group":"neuchatel-city"},{"region":"neuchatel","tileId":"e2558250_n1203000_s250","group":"neuchatel-city"},{"region":"neuchatel","tileId":"e2557000_n1201000_s250","group":"neuchatel-city"},{"region":"neuchatel","tileId":"e2557000_n1200750_s250","group":"neuchatel-city"},{"region":"neuchatel","tileId":"e2557000_n1201750_s250","group":"neuchatel-city"},{"region":"neuchatel","tileId":"e2557000_n1201500_s250","group":"neuchatel-city"},{"region":"neuchatel","tileId":"e2556000_n1201750_s250","group":"neuchatel-city"},{"region":"neuchatel","tileId":"e2555750_n1201750_s250","group":"neuchatel-city"},{"region":"neuchatel","tileId":"e2556000_n1202250_s250","group":"neuchatel-city"},{"region":"neuchatel","tileId":"e2555750_n1202250_s250","group":"neuchatel-city"},{"region":"neuchatel","tileId":"e2555750_n1202000_s250","group":"neuchatel-city"},{"region":"neuchatel","tileId":"e2556000_n1202000_s250","group":"neuchatel-city"}],"selectionProfile":"top-priority","derivedFrom":"data/processed/precompute/high-value-tile-selection.json"}; // sera remplacé lors de l'embed
      const WGS84 = "EPSG:4326";
      const LV95 = "EPSG:2056";
      // Top-priority tiles are colored per REGION so Morges/Nyon stand out
      // next to Lausanne/Geneve.
      const TOP_PRIORITY_COLORS = {
        lausanne: "#e63946", // bright red
        morges:   "#2e8b57", // sea green
        nyon:     "#c77dff", // light lavender
        geneve:   "#f4d35e", // bright yellow
      };
      // Broader geographic groups (commune-based coverage).
      const GROUP_COLORS = {
        "lausanne-west":  "#1c7c8c", // teal — EPFL, Renens, central Lausanne
        "lausanne-east":  "#f4a261", // burnt orange — Pully → Saint-Saphorin Lavaux
        "vevey-city":     "#4a6fa5", // blue — commune de Vevey (lake filtered out)
        "neuchatel-city": "#2a9d8f", // emerald — commune de Neuchâtel (lake filtered out)
        "la-chaux-de-fonds-city": "#e76f51", // coral — La Chaux-de-Fonds (centre urbain, Jura exclu)
        "geneva":         "#8e44ad", // purple — Genève + Carouge + Pregny + Grand-Saconnex
      };
      const GROUP_LABELS = {
        "lausanne-west":  "Lausanne Ouest (EPFL, Renens, centre)",
        "lausanne-east":  "Grand Lausanne Est / Lavaux",
        "vevey-city":     "Vevey (commune, sans Léman)",
        "neuchatel-city": "Neuchâtel (commune, sans le lac)",
        "la-chaux-de-fonds-city": "La Chaux-de-Fonds (centre urbain)",
        "geneva":         "Grande Genève (pointe du lac)",
      };
      // Fallback per-region colors for tiles without a group.
      const COLORS = {
        lausanne:   "#d94f2b",
        morges:     "#2e8b57",
        nyon:       "#8c3f91",
        geneve:     "#ad7b20",
        vevey:      "#4a6fa5",
        vevey_city: "#4a6fa5",
        neuchatel:  "#2a9d8f",
        la_chaux_de_fonds: "#e76f51",
      };
      function tileColor(tile) {
        if (tile.group === "top-priority") {
          return TOP_PRIORITY_COLORS[tile.region] || "#e63946";
        }
        if (tile.group && GROUP_COLORS[tile.group]) return GROUP_COLORS[tile.group];
        return COLORS[tile.region] || "#cc4f39";
      }

      proj4.defs(
        LV95,
        "+proj=somerc +lat_0=46.95240555555556 +lon_0=7.439583333333333 +k_0=1 +x_0=2600000 +y_0=1200000 +ellps=bessel +towgs84=674.374,15.056,405.346,0,0,0,0 +units=m +no_defs",
      );

      function lv95ToWgs84(easting, northing) {
        const [lon, lat] = proj4(LV95, WGS84, [easting, northing]);
        return { lat, lon };
      }

      function wgs84ToTileId(lat, lon, tileSize = 250) {
        const [easting, northing] = proj4(WGS84, LV95, [lon, lat]);
        const minE = Math.floor(easting / tileSize) * tileSize;
        const minN = Math.floor(northing / tileSize) * tileSize;
        return `e${Math.round(minE)}_n${Math.round(minN)}_s${tileSize}`;
      }

      function parseTileId(tileId) {
        const match = /^e(\d+)_n(\d+)_s(\d+)$/.exec(tileId);
        if (!match) {
          throw new Error(`Tile ID invalide: ${tileId}`);
        }
        return {
          minEasting: Number(match[1]),
          minNorthing: Number(match[2]),
          tileSize: Number(match[3]),
        };
      }

      function tileBounds(tileId) {
        const { minEasting, minNorthing, tileSize } = parseTileId(tileId);
        const maxEasting = minEasting + tileSize;
        const maxNorthing = minNorthing + tileSize;
        const sw = lv95ToWgs84(minEasting, minNorthing);
        const ne = lv95ToWgs84(maxEasting, maxNorthing);
        return [
          [Math.min(sw.lat, ne.lat), Math.min(sw.lon, ne.lon)],
          [Math.max(sw.lat, ne.lat), Math.max(sw.lon, ne.lon)],
        ];
      }


      async function render() {
        const data = SELECTION_DATA;
        if (!data) {
          throw new Error("Données non embarquées. Lance : node scripts/tools/embed-tile-selection-in-map.mjs");
        }

        // Legend — top-priority tiles show one entry per region (so Morges
        // and Nyon get their own color swatch); other groups are one entry.
        const legend = document.getElementById("legend");
        const legendLines = [];
        const tileCountByRegion = {};
        const tileCountByGroup = {};
        const topPriorityByRegion = {};
        data.tiles.forEach((t) => {
          tileCountByRegion[t.region] = (tileCountByRegion[t.region] || 0) + 1;
          if (t.group) {
            tileCountByGroup[t.group] = (tileCountByGroup[t.group] || 0) + 1;
          }
          if (t.group === "top-priority") {
            topPriorityByRegion[t.region] = (topPriorityByRegion[t.region] || 0) + 1;
          }
        });

        // Top priority split by region
        const TOP_REGION_ORDER = ["lausanne", "geneve", "morges", "nyon"];
        const topRegions = TOP_REGION_ORDER.filter((r) => (topPriorityByRegion[r] ?? 0) > 0);
        if (topRegions.length > 0) {
          legendLines.push('<h2>Top priority (places-density)</h2>');
          topRegions.forEach((region) => {
            const color = TOP_PRIORITY_COLORS[region] || "#e63946";
            const count = topPriorityByRegion[region];
            const label = region.charAt(0).toUpperCase() + region.slice(1);
            legendLines.push(
              `<div class="legend-item">` +
              `<span class="legend-swatch" style="background:${color}"></span>` +
              `${label} <span style="color:#59656f;margin-left:2px">(${count})</span>` +
              `</div>`,
            );
          });
        }

        // Other geographic groups
        const GROUP_ORDER = ["lausanne-west", "lausanne-east", "vevey-city", "neuchatel-city", "la-chaux-de-fonds-city", "geneva"];
        const otherGroups = GROUP_ORDER.filter((g) => (tileCountByGroup[g] ?? 0) > 0);
        if (otherGroups.length > 0) {
          legendLines.push('<h2 style="margin-top:10px">Couverture étendue</h2>');
          otherGroups.forEach((g) => {
            const count = tileCountByGroup[g];
            legendLines.push(
              `<div class="legend-item">` +
              `<span class="legend-swatch" style="background:${GROUP_COLORS[g]}"></span>` +
              `${GROUP_LABELS[g] ?? g} <span style="color:#59656f;margin-left:2px">(${count})</span>` +
              `</div>`,
            );
          });
        }

        // Tiles without any group: fall back to per-region color
        const regionsWithoutGroup = Object.keys(tileCountByRegion)
          .filter((r) => !data.tiles.some((t) => t.region === r && t.group))
          .sort();
        if (regionsWithoutGroup.length > 0) {
          legendLines.push('<h2 style="margin-top:10px">Autres régions</h2>');
          regionsWithoutGroup.forEach((region) => {
            const color = COLORS[region] || "#cc4f39";
            const count = tileCountByRegion[region] || 0;
            const label = region.charAt(0).toUpperCase() + region.slice(1);
            legendLines.push(
              `<div class="legend-item">` +
              `<span class="legend-swatch" style="background:${color}"></span>` +
              `${label} <span style="color:#59656f;margin-left:2px">(${count})</span>` +
              `</div>`,
            );
          });
        }
        legend.innerHTML = legendLines.join("");

        // Single map
        const map = L.map("map", { zoomControl: true, attributionControl: true });

        L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
          subdomains: "abc",
          maxZoom: 19,
          crossOrigin: true,
          attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
        }).addTo(map);

        const allRectangles = [];

        data.tiles.forEach((tile) => {
          const color = tileColor(tile);
          const bounds = tileBounds(tile.tileId);

          const rectangle = L.rectangle(bounds, {
            color,
            weight: 2,
            fillColor: color,
            fillOpacity: 0.18,
          }).addTo(map);

          // Tiles merged from a bbox selection (e.g. greater-lausanne) don't
          // carry the places-density metadata, so every field is optional.
          const labels = tile.targetAreaLabels ?? [];
          const ids = tile.targetAreaIds ?? [];
          const scoreStr = tile.score != null ? tile.score : "—";
          const outdoorStr =
            tile.counts?.outdoorSeating != null ? tile.counts.outdoorSeating : "—";
          const zonesHtml = labels
            .map((l) => `<div style="margin:1px 0">· ${l}</div>`)
            .join("");
          const placesHtml = tile.samplePlaceNames?.length
            ? `<div style="margin-top:6px;color:#59656f;font-size:12px">${tile.samplePlaceNames.slice(0, 5).join(", ")}</div>`
            : "";

          rectangle.bindTooltip(
            `<strong>${tile.tileId}</strong><br>Score ${scoreStr} · Outdoor ${outdoorStr}`,
            { sticky: true },
          );

          rectangle.bindPopup(
            `<span class="tile-id">${tile.tileId}</span>` +
            `<div style="margin-top:6px">${zonesHtml}</div>` +
            `<div style="margin-top:4px;font-size:12px">Score&nbsp;${scoreStr} &nbsp;·&nbsp; Outdoor&nbsp;${outdoorStr}</div>` +
            placesHtml,
          );

          rectangle.on("click", () => {
            console.log(
              `[tile] ${tile.tileId} | region: ${tile.region} | zones: ${ids.join(", ")} | score: ${scoreStr} | outdoor: ${outdoorStr}`,
            );
          });

          allRectangles.push(rectangle);
        });

        const group = L.featureGroup(allRectangles);
        map.fitBounds(group.getBounds().pad(0.05));

        // Click anywhere → log+show tile ID for that position
        const selectedTileIds = new Set(data.tiles.map((t) => t.tileId));
        const pickedTiles = [];
        const pickedLayersByTileId = new Map(); // tileId → L.Rectangle
        const PICKED_COLOR = "#7b2ff7";

        map.on("click", (e) => {
          const tileId = wgs84ToTileId(e.latlng.lat, e.latlng.lng);
          const isTopPriority = selectedTileIds.has(tileId);

          // Top-priority tiles are not pickable — clicking them just logs their info
          if (isTopPriority) {
            console.log(`[tile] ${tileId} (déjà dans la sélection top-priority — non ajoutée)`);
            return;
          }

          const existingIdx = pickedTiles.indexOf(tileId);
          if (existingIdx === -1) {
            // Add
            pickedTiles.push(tileId);
            const rect = L.rectangle(tileBounds(tileId), {
              color: PICKED_COLOR,
              weight: 2.5,
              fillColor: PICKED_COLOR,
              fillOpacity: 0.22,
              dashArray: "6 4",
            }).addTo(map);
            pickedLayersByTileId.set(tileId, rect);
          } else {
            // Remove
            pickedTiles.splice(existingIdx, 1);
            const rect = pickedLayersByTileId.get(tileId);
            if (rect) { map.removeLayer(rect); pickedLayersByTileId.delete(tileId); }
          }
          const action = existingIdx === -1 ? "+" : "-";

          console.log(`[tile] ${action} ${tileId}`);
          console.log("[picked]", JSON.stringify(pickedTiles));

          L.popup()
            .setLatLng(e.latlng)
            .setContent(
              `<span class="tile-id">${tileId}</span>` +
              `<div style="margin-top:4px;font-size:12px;color:${existingIdx === -1 ? PICKED_COLOR : "#b42318"}">` +
              `${existingIdx === -1 ? "✓ ajoutée" : "✗ retirée"} · ${pickedTiles.length} tuile${pickedTiles.length !== 1 ? "s" : ""} dans le panier` +
              `</div>`,
            )
            .openOn(map);
        });

        document.body.dataset.ready = "true";
      }

      render().catch((error) => {
        document.body.dataset.ready = "error";
        const pre = document.createElement("pre");
        pre.style.cssText = "color:#b42318;padding:24px;position:absolute;top:0;left:0;z-index:9999;background:#fff";
        pre.textContent = error instanceof Error ? error.message : String(error);
        document.body.appendChild(pre);
      });
    </script>
