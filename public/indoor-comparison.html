// --- Decode base64 bitfield ---
function decodeBitfield(b64, count) {
  var raw = atob(b64);
  var bytes = new Uint8Array(raw.length);
  for (var i = 0; i < raw.length; i++) bytes[i] = raw.charCodeAt(i);
  var result = new Uint8Array(count);
  for (var i = 0; i < count; i++) {
    result[i] = (bytes[i >> 3] >> (i & 7)) & 1;
  }
  return result;
}

var zenith = decodeBitfield(ZENITH_B64, W * H);
var hull = decodeBitfield(HULL_B64, W * H);

// --- Colors ---
var COL_OUTDOOR = [232, 200, 64, 255];    // yellow
var COL_INDOOR  = [42, 42, 58, 255];      // dark gray
var COL_ZENITH_ONLY = [48, 160, 80, 255]; // green (zenith says indoor, hull says outdoor)
var COL_HULL_ONLY = [208, 64, 64, 255];   // red (hull says indoor, zenith says outdoor = courtyard)
var COL_BOTH_INDOOR = [42, 42, 58, 255];  // dark gray (both agree indoor)
var COL_BOTH_OUTDOOR = [232, 200, 64, 255]; // yellow (both agree outdoor)
var COL_OOB = [30, 30, 50, 255];          // out of tile bounds

// --- Render helpers ---
// Note: canvas Y=0 is top. Our data row 0 = view south (lowest northing).
// We flip Y so north is at top: canvas row r -> data row (H-1-r).

function renderMask(canvasId, mask, label) {
  var c = document.getElementById(canvasId);
  var ctx = c.getContext("2d");
  var img = ctx.createImageData(W, H);
  var d = img.data;
  var indoorCount = 0;
  for (var cy = 0; cy < H; cy++) {
    var dy = H - 1 - cy; // flip Y
    for (var cx = 0; cx < W; cx++) {
      var idx = dy * W + cx;
      var px = (cy * W + cx) * 4;
      var isIndoor = mask[idx];
      if (isIndoor) indoorCount++;
      var col = isIndoor ? COL_INDOOR : COL_OUTDOOR;
      d[px] = col[0]; d[px+1] = col[1]; d[px+2] = col[2]; d[px+3] = col[3];
    }
  }
  ctx.putImageData(img, 0, 0);

  // Draw building footprint outlines
  drawFootprints(ctx);

  return indoorCount;
}

function renderDiff(canvasId, zenithMask, hullMask) {
  var c = document.getElementById(canvasId);
  var ctx = c.getContext("2d");
  var img = ctx.createImageData(W, H);
  var d = img.data;
  var zenithOnly = 0, hullOnly = 0, both = 0;
  for (var cy = 0; cy < H; cy++) {
    var dy = H - 1 - cy;
    for (var cx = 0; cx < W; cx++) {
      var idx = dy * W + cx;
      var px = (cy * W + cx) * 4;
      var z = zenithMask[idx];
      var h = hullMask[idx];
      var col;
      if (z && h) { col = COL_BOTH_INDOOR; both++; }
      else if (z && !h) { col = COL_ZENITH_ONLY; zenithOnly++; }
      else if (!z && h) { col = COL_HULL_ONLY; hullOnly++; }
      else { col = COL_BOTH_OUTDOOR; }
      d[px] = col[0]; d[px+1] = col[1]; d[px+2] = col[2]; d[px+3] = col[3];
    }
  }
  ctx.putImageData(img, 0, 0);
  drawFootprints(ctx);
  return { zenithOnly: zenithOnly, hullOnly: hullOnly, both: both };
}

function drawFootprints(ctx) {
  ctx.strokeStyle = "rgba(255,255,255,0.35)";
  ctx.lineWidth = 0.5;
  for (var fi = 0; fi < FOOTPRINTS.length; fi++) {
    var fp = FOOTPRINTS[fi];
    var pts = fp.pts;
    var isTarget = (fp.id === "obs-42143");
    ctx.strokeStyle = isTarget ? "rgba(0,180,255,0.7)" : "rgba(255,255,255,0.25)";
    ctx.lineWidth = isTarget ? 1 : 0.5;
    ctx.beginPath();
    // flip Y: canvas y = H - data y
    ctx.moveTo(pts[0].x, H - pts[0].y);
    for (var pi = 1; pi < pts.length; pi++) {
      ctx.lineTo(pts[pi].x, H - pts[pi].y);
    }
    ctx.closePath();
    ctx.stroke();
  }
}

    "date=2026-08-15&startLocalTime=12:00&endLocalTime=12:15&sampleEveryMinutes=15" +
    "&gridStepMeters=1&buildingHeightBiasMeters=0&cacheOnly=false&maxComputeTiles=4" +
    "&minLon=6.6198&minLat=46.5164&maxLon=6.6225&maxLat=46.5190";

  statusEl.textContent = "Connecting...";

  var es = new EventSource(sseUrl);
  var startInfo = null;
  var tilesReceived = 0;

  es.addEventListener("start", function(e) {
    startInfo = JSON.parse(e.data);
    statusEl.textContent = "Started: " + startInfo.totalTiles + " tiles, frameCount=" + startInfo.frameCount;
  });

  es.addEventListener("tile", function(e) {
    var tile = JSON.parse(e.data);
    tilesReceived++;
    statusEl.textContent = "Tile " + tilesReceived + "/" + (startInfo ? startInfo.totalTiles : "?") +
      " | grid " + tile.grid.width + "x" + tile.grid.height + " | decoding...";

    // Decode the gzip-compressed masks blob
    decodeMasks(tile.masksBase64, tile.grid.width, tile.grid.height, startInfo ? startInfo.frameCount : 0)
      .then(function(masks) {
        // Render the outdoor mask onto our view
        renderSSETile(tile, masks.outdoor);
        statusEl.textContent = "Tile " + tilesReceived + "/" + (startInfo ? startInfo.totalTiles : "?") +
          " rendered | outdoor bits: " + countBits(masks.outdoor, tile.grid.width * tile.grid.height);
      })
      .catch(function(err) {
        statusEl.textContent = "Decode error: " + err.message;
      });
  });

  es.addEventListener("done", function(e) {
    es.close();
    var info = JSON.parse(e.data);
    statusEl.textContent = "Done! " + tilesReceived + " tiles, " +
      (info.totalPointCount || "?") + " outdoor pts, " +
      (info.totalIndoorExcluded || "?") + " indoor excluded";
    // Draw footprints on top
    drawFootprints(sseCtx);
  });

  es.addEventListener("error", function(e) {
    if (es.readyState === EventSource.CLOSED) {
      statusEl.textContent = "SSE connection closed";
    } else {
      statusEl.textContent = "SSE error (is the server running on localhost:3000?)";
    }
  });

  function countBits(mask, count) {
    var n = 0;
    for (var i = 0; i < count; i++) {
      if ((mask[i >> 3] >> (i & 7)) & 1) n++;
    }
    return n;
  }

  // Decompress gzip base64 blob using DecompressionStream
  function decodeMasks(masksBase64, gridW, gridH, frameCount) {
    var binaryStr = atob(masksBase64);
    var compressed = new Uint8Array(binaryStr.length);
    for (var i = 0; i < binaryStr.length; i++) {
      compressed[i] = binaryStr.charCodeAt(i);
    }

    var ds = new DecompressionStream("gzip");
    var writer = ds.writable.getWriter();
    var reader = ds.readable.getReader();

    writer.write(compressed);
    writer.close();

    var chunks = [];
    var totalLen = 0;

    function readAll() {
      return reader.read().then(function(result) {
        if (result.done) {
          var decompressed = new Uint8Array(totalLen);
          var offset = 0;
          for (var i = 0; i < chunks.length; i++) {
            decompressed.set(chunks[i], offset);
            offset += chunks[i].length;
          }
          var maskBytes = Math.ceil((gridW * gridH) / 8);
          var outdoor = decompressed.slice(0, maskBytes);
          return { outdoor: outdoor };
        }
        chunks.push(result.value);
        totalLen += result.value.length;
        return readAll();
      });
    }

    return readAll();
  }

  // Render a single SSE tile's outdoor mask onto the SSE canvas
  function renderSSETile(tile, outdoorMask) {
    var grid = tile.grid;
    // grid.minIx, minIy are in absolute LV95 integer coords (meters)
    // Our view: viewMinE..viewMinE+160, viewMinN..viewMinN+160
    var img = sseCtx.getImageData(0, 0, W, H);
    var d = img.data;

    for (var gy = 0; gy < grid.height; gy++) {
      var absN = grid.minIy + gy; // absolute northing
      var vy = absN - VIEW_MIN_N; // view-space row (0 = south)
      if (vy < 0 || vy >= H) continue;
      var canvasY = H - 1 - vy; // flip for canvas

      for (var gx = 0; gx < grid.width; gx++) {
        var absE = grid.minIx + gx;
        var vx = absE - VIEW_MIN_E;
        if (vx < 0 || vx >= W) continue;

        var cellIdx = gy * grid.width + gx;
        var isOutdoor = (outdoorMask[cellIdx >> 3] >> (cellIdx & 7)) & 1;
        var px = (canvasY * W + vx) * 4;
        var col = isOutdoor ? COL_OUTDOOR : COL_INDOOR;
        d[px] = col[0]; d[px+1] = col[1]; d[px+2] = col[2]; d[px+3] = col[3];
      }
    }
    sseCtx.putImageData(img, 0, 0);
  }
})();
</script>
