# Bind-mounts (host → container) :
#   MAPPY_ATLAS_PATH     → /data/cache/sunlight       (atlases, gros, ~10-30 GB)
#   MAPPY_BUILDINGS_PATH → /data/processed/buildings  (lausanne-buildings-index.json, ~70 MB)
# Les places (Posture 4) ne sont PLUS un bind-mount : elles sont bakées
# dans l'image Docker et copiées dans un tmpfs au démarrage par
# `docker-entrypoint.sh`. Le startup check télécharge la dernière
# release `places-v*` depuis GitHub (5s timeout, fail-soft) pour
# propager une nouvelle release sans rebuild d'image.
# TODO migration vers un volume Docker ext4 quand on saura gérer le format final
# des atlas shardés (cf. tasks).
services:
  mappy-hour:
    image: ghcr.io/salfab/mappy-hour:latest
    build:
      context: .
    container_name: mappy-hour
    restart: unless-stopped
    # Hardening : cap_drop ALL + no-new-privileges + read_only rootfs + tmpfs.
    # user:node non applique (corepack veut ecrire /home/node/.cache, conflit
    # avec read_only ; bascule a tenter quand on aura un volume scratch
    # pour /home/node).
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
      # Posture 4 : tmpfs writable pour les places (baked dans l'image
      # puis copiés ici par docker-entrypoint.sh, et potentiellement
      # overlayés par check-places-update.mjs au démarrage).
      #
      # 16 MB : taille au 2026-05-12 = ~5.4 MB (combined places.json 2.7 MB +
      # 6 splits per-region 0.03-1.5 MB chacun, total ~2.6 MB). Le 4 MB
      # initial faisait crasher la cp à mi-chemin → JSON tronqués → 500
      # sur /api/places/suggest et timeline event:places vide. La marge à 16
      # absorbe la croissance OSM (~2× la valeur actuelle).
      - /data/processed/places:size=16m
    environment:
      - NODE_ENV=production
      - MAPPY_DATA_ROOT=/data
      # Runtime flag : MAPPY_FORCE_CACHE_ONLY=true → image immuable utilisable
      # sur un serveur GPU (=false) ou headless (=true) sans rebuild.
      - MAPPY_FORCE_CACHE_ONLY=true
      # Cloudflare Turnstile server-side secret. Comes from .env.ci synced by
      # the deploy workflow (cf .github/workflows/deploy-mitch.yml). Absent
      # locally → requireTurnstile() falls through to bypass mode, so dev
      # without an account works out of the box.
      - TURNSTILE_SECRET_KEY=${TURNSTILE_SECRET_KEY:-}
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - type: bind
        source: ${MAPPY_ATLAS_PATH:-./data/cache/sunlight}
        target: /data/cache/sunlight
        read_only: true
      - type: bind
        source: ${MAPPY_BUILDINGS_PATH:-./data/processed/buildings}
        target: /data/processed/buildings
        read_only: true
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:3000/api/datasets',r=>{process.exitCode=r.statusCode===200?0:1}).on('error',()=>{process.exitCode=1})\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── Umami analytics (self-hosted) ─────────────────────────────────────────
  # Self-hosted, privacy-friendly visitor analytics. No cookies (= pas de
  # bannière consentement), no third party.
  #
  # The Next.js app proxies tracker requests via rewrites (cf. next.config.ts)
  # so the public surface stays unchanged: tracking script at /_analytics/script.js
  # and events POSTed to /_analytics/api/send, both transparently routed to
  # the `umami` container inside the docker compose network.
  #
  # Initial setup (one-shot, after `docker compose up -d`):
  #   1. Tunnel to the dashboard:
  #        ssh -L 3001:127.0.0.1:3001 user@mitch
  #      Then open http://127.0.0.1:3001 in your browser.
  #   2. Default login: admin / umami → CHANGE THE PASSWORD IMMEDIATELY.
  #   3. Settings → Websites → Add: name = "MappyHour", domain = the public host.
  #   4. Copy the generated Website ID (UUID), put it in .env:
  #        NEXT_PUBLIC_UMAMI_WEBSITE_ID=<uuid>
  #   5. Rebuild + restart mappy-hour (the env is consumed at `next build`,
  #      hence the build-arg in .github/workflows/docker-publish.yml).
  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    container_name: umami
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://umami:${UMAMI_DB_PASSWORD:-umami}@umami-db:5432/umami
      DATABASE_TYPE: postgresql
      APP_SECRET: ${UMAMI_APP_SECRET:?set UMAMI_APP_SECRET in .env to a long random string}
    depends_on:
      umami-db:
        condition: service_healthy
    ports:
      # 0.0.0.0 → reachable via Mitch's Tailscale IP/hostname for the
      # admin dashboard (no SSH tunnel needed). Mitch has no public route
      # on port 3001 — only port 443 is exposed via Tailscale Funnel —
      # so this is safe: tailnet members only.
      - "0.0.0.0:3001:3000"

  umami-db:
    image: postgres:15-alpine
    container_name: umami-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: umami
      POSTGRES_USER: umami
      POSTGRES_PASSWORD: ${UMAMI_DB_PASSWORD:-umami}
    volumes:
      - umami-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # One-shot container pour télécharger / mettre à jour les atlas.
  # Lancer manuellement : docker compose run --rm atlas-loader
  # Ajouter `--with-buildings` à la fin pour aussi récupérer le global
  # buildings index (~70 MB), nécessaire seulement si l'hôte peut re-précomputer.
  # Profil "loader" : n'est pas inclus dans `docker compose up`.
  atlas-loader:
    image: ghcr.io/salfab/mappy-hour:latest
    build:
      context: .
    profiles:
      - loader
    entrypoint: ["pnpm", "atlas:download", "--"]
    command: ["--repo=salfab/mappy-hour", "--regions=lausanne,nyon,morges,vevey,vevey_city,neuchatel,la_chaux_de_fonds,bern,zurich,thun,geneve"]
    environment:
      - MAPPY_DATA_ROOT=/data
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
    volumes:
      - type: bind
        source: ${MAPPY_ATLAS_PATH:-./data/cache/sunlight}
        target: /data/cache/sunlight
      - type: bind
        source: ${MAPPY_BUILDINGS_PATH:-./data/processed/buildings}
        target: /data/processed/buildings

volumes:
  umami-db-data:
