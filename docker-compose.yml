# MAPPY_ATLAS_PATH (env var, defaults to ./data/cache/sunlight) controls where the
# atlas cache lives on the host. Bind-mount approach pour l'instant — TODO migration
# vers un volume Docker ext4 quand on saura gérer les atlas shardés (cf. tasks).
services:
  mappy-hour:
    image: ghcr.io/salfab/mappy-hour:latest
    build:
      context: .
    container_name: mappy-hour
    restart: unless-stopped
    # Note securite: cap_drop ALL et no-new-privileges cassent Next.js 16
    # (crash apres "Ready", ELIFECYCLE Command failed). Perimetre de securite assure
    # par WSL2 (isolation VM) + Tailscale Funnel (pas d'expo directe). A revoir si
    # on identifie les capabilities exactes necessaires.
    environment:
      - NODE_ENV=production
      - MAPPY_DATA_ROOT=/data
      # Runtime flag : MAPPY_FORCE_CACHE_ONLY=true → image immuable utilisable
      # sur un serveur GPU (=false) ou headless (=true) sans rebuild.
      - MAPPY_FORCE_CACHE_ONLY=true
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - type: bind
        source: ${MAPPY_ATLAS_PATH:-./data/cache/sunlight}
        target: /data/cache/sunlight
        read_only: true
    # healthcheck retire temporairement: investiguer le crashloop "ELIFECYCLE
    # Command failed" qui ne se produit pas avec docker run --rm direct.

  # One-shot container pour télécharger / mettre à jour les atlas.
  # Lancer manuellement : docker compose run --rm atlas-loader
  # Profil "loader" : n'est pas inclus dans `docker compose up`.
  atlas-loader:
    image: ghcr.io/salfab/mappy-hour:latest
    build:
      context: .
    profiles:
      - loader
    entrypoint: ["pnpm", "atlas:download", "--"]
    command: ["--repo=salfab/mappy-hour", "--regions=lausanne,nyon,morges,vevey,geneve"]
    environment:
      - MAPPY_DATA_ROOT=/data
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
    volumes:
      - type: bind
        source: ${MAPPY_ATLAS_PATH:-./data/cache/sunlight}
        target: /data/cache/sunlight
